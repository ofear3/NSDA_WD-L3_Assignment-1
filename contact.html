<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    
        <nav>
            <a href="m_saif.html">Home</a> &nbsp; &nbsp; &nbsp;

        <br><br> <hr>
        <form>

    <fieldset>
        <legend>Personal Information</legend>

        <label for="fname">Full Name:</label><br>
        <input type="text" id="fname" name="fname" placeholder="Enter your name">
        <br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
        <br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password">
        <br><br>

        <label for="birth">Date of Birth:</label><br>
        <input type="date" id="birth" name="birth">
        <br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other
        <br><br>

        <label for="website">Website:</label><br>
        <input type="url" id="website" name="website" placeholder="https://example.com">
        <br><br>

        <label for="photo">Upload Photo:</label><br>
        <input type="file" id="photo" name="photo">

    </fieldset>


    <br>


    <fieldset>
        <legend>Contact Details</legend>

        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject">
        <br><br>

        <label for="country">Country:</label><br>
        <select id="country" name="country">
            <option>Bangladesh</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select>
        <br><br>

        <label for="message">Your Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="40"
        placeholder="Write your message"></textarea>
        <br><br>

        <label for="age">Age:</label><br>
        <input type="number" max="40" min="20" id="age" name="age">
        <br><br>

        <label for="range">Experience Level:</label><br>
        <input type="range" id="range" name="range">
        <br><br>

        <label for="color">Choose Color:</label><br>
        <input type="color" id="color" name="color">
        <br><br>

        <label>Interested In:</label><br>
        <input type="checkbox" name="service" value="web"> Web Design
        <input type="checkbox" name="service" value="app"> App Development
        <input type="checkbox" name="service" value="seo"> SEO
        <br><br>

        <input type="hidden" name="form" value="contact">

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </fieldset>

</form>
  

</body>
</html>
